name: Market Monitor

on:
  schedule:
    # All times in UTC. Eastern Time = UTC-4 (EDT) / UTC-5 (EST).
    # Using EDT offsets (summer). Adjust ±1h in winter or use UTC+offset logic.

    # 8:00 AM ET → 12:00 UTC
    - cron: '0 12 * * 1-5'    # earnings-check (weekdays)

    # 9:45 AM ET → 13:45 UTC
    - cron: '45 13 * * 1-5'   # morning-scan (weekdays)

    # Every 15 min during market hours: 9:45 AM – 4:00 PM ET (13:45–20:00 UTC)
    - cron: '0,15,30,45 14-19 * * 1-5'   # price-check
    - cron: '0 20 * * 1-5'               # price-check at 4:00 PM ET

    # 4:15 PM ET → 20:15 UTC
    - cron: '15 20 * * 1-5'   # portfolio-snapshot (before daily-summary)

    # 4:30 PM ET → 20:30 UTC
    - cron: '30 20 * * 1-5'   # sector-update

    # 4:45 PM ET → 20:45 UTC
    - cron: '45 20 * * 1-5'   # daily-summary

    # 6:00 PM ET → 22:00 UTC
    - cron: '0 22 * * 1-5'    # macro-update

    # 8:00 AM ET → 12:00 UTC (daily, including weekends for cache health)
    - cron: '0 12 * * *'      # portfolio-sync (morning)
    - cron: '0 20 * * *'      # portfolio-sync (evening)

    # 2:00 AM UTC daily
    - cron: '0 2 * * *'       # cache-cleanup

    # 10:30 AM ET → 14:30 UTC (weekdays, after morning-scan)
    - cron: '30 14 * * 1-5'   # momentum-watchlist

    # 6:00 AM ET Sunday → 10:00 UTC
    - cron: '0 10 * * 0'      # ticker-discovery

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run manually'
        required: true
        type: choice
        options:
          - morning-scan
          - price-check
          - daily-summary
          - macro-update
          - earnings-check
          - portfolio-sync
          - sector-update
          - portfolio-snapshot
          - cache-cleanup
          - ticker-discovery
          - momentum-watchlist

jobs:
  # ── Earnings check — 8:00 AM ET weekdays ──────────────────────────────────
  earnings-check:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'earnings-check' ||
      github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger earnings-check
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/earnings-check" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: earnings-check"

  # ── Morning scan — 9:45 AM ET weekdays ───────────────────────────────────
  # Endpoint returns immediately (scan runs as background task on Render).
  # Actual scan duration: 5-60 min depending on cache warmth.
  morning-scan:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'morning-scan' ||
      github.event_name == 'schedule' && github.event.schedule == '45 13 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake Render (cold start can take 60s)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger morning-scan
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/morning-scan" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: morning-scan"

  # ── Price check — every 15 min during market hours ────────────────────────
  price-check:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'price-check' ||
      github.event_name == 'schedule' && (
        github.event.schedule == '0,15,30,45 14-19 * * 1-5' ||
        github.event.schedule == '0 20 * * 1-5'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger price-check
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/price-check" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: price-check"

  # ── Portfolio snapshot — 4:15 PM ET ──────────────────────────────────────
  portfolio-snapshot:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'portfolio-snapshot' ||
      github.event_name == 'schedule' && github.event.schedule == '15 20 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger portfolio-snapshot
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/portfolio-snapshot" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: portfolio-snapshot"

  # ── Sector update — 4:30 PM ET ────────────────────────────────────────────
  sector-update:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sector-update' ||
      github.event_name == 'schedule' && github.event.schedule == '30 20 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger sector-update
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/sector-update" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: sector-update"

  # ── Daily summary — 4:45 PM ET ────────────────────────────────────────────
  daily-summary:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-summary' ||
      github.event_name == 'schedule' && github.event.schedule == '45 20 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger daily-summary
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/daily-summary" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: daily-summary"

  # ── Macro update — 6:00 PM ET ─────────────────────────────────────────────
  macro-update:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'macro-update' ||
      github.event_name == 'schedule' && github.event.schedule == '0 22 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger macro-update
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/macro-update" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: macro-update"

  # ── Portfolio sync — 2x daily ─────────────────────────────────────────────
  portfolio-sync:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'portfolio-sync' ||
      github.event_name == 'schedule' && (
        github.event.schedule == '0 12 * * *' ||
        github.event.schedule == '0 20 * * *'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger portfolio-sync
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/portfolio-sync" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: portfolio-sync"

  # ── Cache cleanup — 2:00 AM daily ─────────────────────────────────────────
  cache-cleanup:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'cache-cleanup' ||
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger cache-cleanup
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/cache-cleanup" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: cache-cleanup"

  # ── Ticker discovery — Sunday 6:00 AM ET ─────────────────────────────────────
  ticker-discovery:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'ticker-discovery' ||
      github.event_name == 'schedule' && github.event.schedule == '0 10 * * 0'
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger ticker-discovery
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/ticker-discovery" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: ticker-discovery"

  # ── Momentum watchlist — 10:30 AM ET weekdays ────────────────────────────────
  momentum-watchlist:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'momentum-watchlist' ||
      github.event_name == 'schedule' && github.event.schedule == '30 14 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/health")
            [ "$STATUS" = "200" ] && break
            sleep 20
          done
          true

      - name: Trigger momentum-watchlist
        run: |
          curl -s -f --max-time 30 \
            -X POST "${{ secrets.RENDER_API_URL }}/api/trigger/momentum-watchlist" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ SwingEdge job failed: momentum-watchlist"
